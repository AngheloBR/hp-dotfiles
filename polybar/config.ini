[colors]
bg = #00000000
pill-bg = #cc1a1b26
fg = #c0caf5
celestial = #7aa2f7
accent = #bb9af7

[bar/main]
monitor = ${env:MONITOR:}
width = 98%
height = 34
offset-x = 1%
offset-y = 10
radius = 17
fixed-center = true
background = ${colors.bg}
foreground = ${colors.fg}
modules-left = bspwm
modules-center = date
modules-right = pulseaudio memory cpu wlan
font-0 = "JetBrainsMono Nerd Font:style=Bold:size=10;3"
font-1 = "JetBrainsMono Nerd Font:size=14;4"
module-margin = 1
padding-right = 2
padding-left = 2

[module/bspwm]
type = internal/bspwm
format = <label-state>
format-background = ${colors.pill-bg}
format-padding = 2
format-radius = 17
label-focused = %index%
label-focused-foreground = ${colors.celestial}
label-focused-padding = 1
label-occupied = %index%
label-occupied-foreground = ${colors.accent}
label-occupied-padding = 1
label-empty = %index%
label-empty-foreground = #414868
label-empty-padding = 1

[module/date]
type = internal/date
interval = 5
date = "%a %d %b"
time = "%H:%M"
label = %time% - %date%
format-background = ${colors.pill-bg}
format-padding = 2
format-radius = 17
format-foreground = ${colors.celestial}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = 󰕾 %percentage%%
format-volume-background = ${colors.pill-bg}
format-volume-padding = 2
format-muted = 󰖁 Muted
format-muted-background = ${colors.pill-bg}
format-muted-padding = 2
